<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple MTG Counters</title>
    <meta name="theme-color" content="#2d3748" />
    <meta name="description" content="A companion app for Magic: The Gathering to track life totals and counters." />
    <link rel="manifest" href="/mtg-counters/manifest.json" />
    <link rel="apple-touch-icon" href="/mtg-counters/icons/icon-180.png" />
    <script type="module" crossorigin src="/mtg-counters/assets/index-BE-_yoPk.js"></script>
    <link rel="stylesheet" crossorigin href="/mtg-counters/assets/index-DLSy0E2i.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/mtg-counters/sw.js')
            .then((registration) => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            }, (error) => {
              console.log('ServiceWorker registration failed: ', error);
            });
        });
      }
    </script>
  </body>
</html>
